<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Constancias → PDF</title>

<!-- Librerías CDN compatibles con GitHub Pages -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*,
*::before,
*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --bg:#0f1117;
  --surface:#1a1d27;
  --border:#2a2d3d;
  --accent:#4f8ef7;
  --accent2:#7c3aed;
  --success:#22c55e;
  --error:#ef4444;
  --text:#e2e8f0;
  --muted:#64748b;
  --radius:12px;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Segoe UI,system-ui,sans-serif;
  min-height:100vh;
  padding:40px 20px 80px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

header{
  text-align:center;
  margin-bottom:40px;
}

header h1{
  font-size:clamp(1.7rem,4vw,2.5rem);
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:10px;
}

header p{
  color:var(--muted);
}

#drop-zone{
  width:100%;
  max-width:700px;
  border:2px dashed var(--border);
  background:var(--surface);
  border-radius:var(--radius);
  padding:50px 25px;
  text-align:center;
  cursor:pointer;
  transition:.25s;
  position:relative;
}

#drop-zone:hover,
#drop-zone.over{
  border-color:var(--accent);
  background:#1e2235;
}

#drop-zone input{
  position:absolute;
  inset:0;
  opacity:0;
  width:100%;
  height:100%;
  cursor:pointer;
}

#drop-zone .icon{
  font-size:3rem;
  display:block;
  margin-bottom:12px;
}

#drop-zone strong{
  display:block;
  margin-bottom:5px;
  font-size:1.05rem;
}

#drop-zone span{
  color:var(--muted);
  font-size:.9rem;
}

#file-section{
  width:100%;
  max-width:700px;
  margin-top:25px;
  display:none;
}

#file-count-label{
  font-size:.85rem;
  color:var(--muted);
  margin-bottom:12px;
  text-transform:uppercase;
}

#file-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.file-item{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 15px;
  display:flex;
  align-items:center;
  gap:12px;
}

.file-name{
  flex:1;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.badge{
  font-size:.72rem;
  padding:4px 10px;
  border-radius:999px;
  font-weight:700;
}

.badge-pending{
  background:#25293b;
  color:#94a3b8;
}

.badge-working{
  background:#173256;
  color:#60a5fa;
}

.badge-done{
  background:#123522;
  color:#4ade80;
}

.badge-error{
  background:#3f1212;
  color:#f87171;
}

.remove-btn{
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
  font-size:1rem;
}

.remove-btn:hover{
  color:var(--error);
}

#controls{
  width:100%;
  max-width:700px;
  margin-top:20px;
  display:none;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

#controls label{
  display:flex;
  align-items:center;
  gap:7px;
  color:var(--muted);
  font-size:.9rem;
}

select{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  padding:5px 10px;
  border-radius:6px;
}

.btn{
  border:none;
  border-radius:8px;
  padding:11px 22px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.btn:disabled{
  opacity:.5;
  cursor:not-allowed;
}

.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
}

.btn-secondary{
  background:var(--surface);
  color:var(--text);
  border:1px solid var(--border);
}

#progress-wrap{
  width:100%;
  max-width:700px;
  margin-top:20px;
  display:none;
}

#progress-bar-bg{
  width:100%;
  height:8px;
  background:var(--border);
  border-radius:999px;
  overflow:hidden;
}

#progress-bar-fill{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:.3s;
}

#progress-label{
  text-align:right;
  color:var(--muted);
  margin-top:7px;
  font-size:.82rem;
}

#log{
  width:100%;
  max-width:700px;
  margin-top:18px;
  background:#0a0c14;
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:15px;
  max-height:220px;
  overflow:auto;
  font-family:Consolas,monospace;
  font-size:.8rem;
  line-height:1.6;
  display:none;
}

.ok{
  color:var(--success);
}

.err{
  color:var(--error);
}

.info{
  color:#60a5fa;
}

#render-frame{
  position:fixed;
  left:-99999px;
  top:0;
  width:1200px;
  height:10px;
  border:none;
  visibility:hidden;
}
</style>
</head>

<body>

<header>
  <h1>📄 HTML → PDF</h1>
  <p>Compatible con GitHub Pages · 100% frontend · Sin Claude</p>
</header>

<div id="drop-zone">
  <input
    type="file"
    id="file-input"
    accept=".html,.htm"
    multiple
    webkitdirectory
  />

  <span class="icon">📁</span>
  <strong>Seleccioná una carpeta HTML</strong>
  <span>Procesamiento local en tu navegador</span>
</div>

<div id="file-section">
  <h2 id="file-count-label">0 archivos</h2>
  <div id="file-list"></div>
</div>

<div id="controls">

  <label>
    Escala:
    <select id="scale-select">
      <option value="1">1x</option>
      <option value="1.5">1.5x</option>
      <option value="2" selected>2x</option>
    </select>
  </label>

  <label>
    Orientación:
    <select id="orientation-select">
      <option value="p">Vertical</option>
      <option value="l">Horizontal</option>
    </select>
  </label>

  <button class="btn btn-secondary" id="clear-btn">
    Limpiar
  </button>

  <button class="btn btn-primary" id="convert-btn">
    Convertir a PDF
  </button>

</div>

<div id="progress-wrap">
  <div id="progress-bar-bg">
    <div id="progress-bar-fill"></div>
  </div>

  <div id="progress-label">
    0 / 0
  </div>
</div>

<div id="log"></div>

<iframe id="render-frame"></iframe>

<script>
const { jsPDF } = window.jspdf;

let files = [];

const dropZone       = document.getElementById('drop-zone');
const fileInput      = document.getElementById('file-input');
const fileSection    = document.getElementById('file-section');
const fileCountLabel = document.getElementById('file-count-label');
const fileList       = document.getElementById('file-list');

const controls       = document.getElementById('controls');
const clearBtn       = document.getElementById('clear-btn');
const convertBtn     = document.getElementById('convert-btn');

const progressWrap   = document.getElementById('progress-wrap');
const progressFill   = document.getElementById('progress-bar-fill');
const progressLabel  = document.getElementById('progress-label');

const logDiv         = document.getElementById('log');
const frame          = document.getElementById('render-frame');

const scaleSelect    = document.getElementById('scale-select');
const orientSelect   = document.getElementById('orientation-select');

dropZone.addEventListener('dragover', e=>{
  e.preventDefault();
  dropZone.classList.add('over');
});

dropZone.addEventListener('dragleave', ()=>{
  dropZone.classList.remove('over');
});

dropZone.addEventListener('drop', e=>{
  e.preventDefault();
  dropZone.classList.remove('over');

  const selected = [...e.dataTransfer.files]
    .filter(f => /\.html?$/i.test(f.name));

  addFiles(selected);
});

fileInput.addEventListener('change', ()=>{
  const selected = [...fileInput.files]
    .filter(f => /\.html?$/i.test(f.name));

  addFiles(selected);

  fileInput.value = '';
});

function addFiles(newFiles){

  newFiles.forEach(file=>{

    const exists = files.some(f=>f.name === file.name);

    if(!exists){
      files.push({
        id: crypto.randomUUID(),
        file,
        name:file.name,
        status:'pending'
      });
    }

  });

  renderFileList();
}

function renderFileList(){

  fileList.innerHTML = '';

  if(!files.length){
    fileSection.style.display = 'none';
    controls.style.display = 'none';
    return;
  }

  fileSection.style.display = 'block';
  controls.style.display = 'flex';

  fileCountLabel.textContent =
    `${files.length} archivo(s) detectado(s)`;

  files.forEach(file=>{

    const item = document.createElement('div');
    item.className = 'file-item';
    item.id = file.id;

    const badgeMap = {
      pending:'Pendiente',
      working:'Procesando',
      done:'Listo',
      error:'Error'
    };

    item.innerHTML = `
      <div class="file-name">${file.name}</div>

      <div class="badge badge-${file.status}">
        ${badgeMap[file.status]}
      </div>

      <button class="remove-btn" data-id="${file.id}">
        ✕
      </button>
    `;

    fileList.appendChild(item);
  });

  document.querySelectorAll('.remove-btn')
    .forEach(btn=>{

      btn.onclick = ()=>{
        const id = btn.dataset.id;

        files = files.filter(f=>f.id !== id);

        renderFileList();
      };

    });
}

function updateStatus(id,status){

  const file = files.find(f=>f.id === id);

  if(file){
    file.status = status;
  }

  renderFileList();
}

function log(message,type=''){

  logDiv.style.display = 'block';

  const line = document.createElement('div');

  line.className = type;

  line.textContent =
    `[${new Date().toLocaleTimeString()}] ${message}`;

  logDiv.appendChild(line);

  logDiv.scrollTop = logDiv.scrollHeight;
}

clearBtn.addEventListener('click', ()=>{

  files = [];

  fileList.innerHTML = '';

  renderFileList();

  logDiv.innerHTML = '';
  logDiv.style.display = 'none';

  progressWrap.style.display = 'none';
});

convertBtn.addEventListener('click', convertAll);

async function convertAll(){

  if(!files.length){
    return;
  }

  convertBtn.disabled = true;
  clearBtn.disabled = true;

  progressWrap.style.display = 'block';

  const scale = Number(scaleSelect.value);
  const orientation = orientSelect.value;

  let completed = 0;

  for(const fileObj of files){

    try{

      updateStatus(fileObj.id,'working');

      log(`Procesando ${fileObj.name}`,'info');

      const pdfBuffer =
        await htmlToPDF(fileObj.file,scale,orientation);

      const pdfName =
        fileObj.name.replace(/\.html?$/i,'.pdf');

      download(pdfBuffer,pdfName);

      updateStatus(fileObj.id,'done');

      log(`PDF generado: ${pdfName}`,'ok');

    }catch(err){

      console.error(err);

      updateStatus(fileObj.id,'error');

      log(`ERROR: ${fileObj.name} → ${err.message}`,'err');
    }

    completed++;

    const percent =
      Math.round((completed / files.length) * 100);

    progressFill.style.width = percent + '%';

    progressLabel.textContent =
      `${completed} / ${files.length} — ${percent}%`;

    await sleep(200);
  }

  convertBtn.disabled = false;
  clearBtn.disabled = false;

  log('Proceso terminado','ok');
}

async function htmlToPDF(file,scale,orientation){

  const html = await file.text();

  const safeHTML = injectStyles(html);

  const blob = new Blob(
    [safeHTML],
    { type:'text/html' }
  );

  const url = URL.createObjectURL(blob);

  frame.src = url;

  await waitIframeLoad(frame);

  const doc =
    frame.contentDocument ||
    frame.contentWindow.document;

  await waitImages(doc);

  const body = doc.body;

  body.style.background = '#ffffff';

  const fullHeight =
    Math.max(
      body.scrollHeight,
      body.offsetHeight,
      body.clientHeight
    );

  frame.style.height = fullHeight + 'px';

  await sleep(500);

  const canvas = await html2canvas(body,{
    scale,
    useCORS:true,
    allowTaint:true,
    backgroundColor:'#ffffff',
    logging:false,
    imageTimeout:20000,
    width:960,
    windowWidth:960,
    windowHeight:fullHeight
  });

  URL.revokeObjectURL(url);

  const pdf = new jsPDF({
    orientation,
    unit:'mm',
    format:'a4'
  });

  const pageWidth =
    orientation === 'p' ? 210 : 297;

  const pageHeight =
    orientation === 'p' ? 297 : 210;

  const imgWidth = pageWidth;

  const imgHeight =
    (canvas.height * imgWidth) / canvas.width;

  let heightLeft = imgHeight;

  let position = 0;

  const imgData =
    canvas.toDataURL('image/jpeg',0.95);

  pdf.addImage(
    imgData,
    'JPEG',
    0,
    position,
    imgWidth,
    imgHeight
  );

  heightLeft -= pageHeight;

  while(heightLeft > 0){

    position = heightLeft - imgHeight;

    pdf.addPage();

    pdf.addImage(
      imgData,
      'JPEG',
      0,
      position,
      imgWidth,
      imgHeight
    );

    heightLeft -= pageHeight;
  }

  return pdf.output('arraybuffer');
}

function injectStyles(html){

  const extraStyles = `
  <style>

    html,body{
      width:960px !important;
      margin:0 !important;
      overflow:visible !important;
      background:#fff !important;
    }

    *{
      -webkit-print-color-adjust:exact !important;
      print-color-adjust:exact !important;
    }

    img{
      max-width:100% !important;
    }

  </style>
  `;

  if(/<\/head>/i.test(html)){

    return html.replace(
      /<\/head>/i,
      extraStyles + '</head>'
    );
  }

  return extraStyles + html;
}

function waitIframeLoad(frame){

  return new Promise((resolve,reject)=>{

    frame.onload = ()=>resolve();

    frame.onerror = ()=>{
      reject(new Error('Error cargando iframe'));
    };

  });
}

function waitImages(doc){

  const images = [...doc.images];

  return Promise.all(
    images.map(img=>{

      if(img.complete){
        return Promise.resolve();
      }

      return new Promise(resolve=>{
        img.onload = resolve;
        img.onerror = resolve;
      });

    })
  );
}

function sleep(ms){
  return new Promise(r=>setTimeout(r,ms));
}

function download(buffer,filename){

  const blob = new Blob(
    [buffer],
    { type:'application/pdf' }
  );

  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');

  a.href = url;
  a.download = filename;

  document.body.appendChild(a);

  a.click();

  a.remove();

  setTimeout(()=>{
    URL.revokeObjectURL(url);
  },3000);
}
</script>

</body>
</html>
