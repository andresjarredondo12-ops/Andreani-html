<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constancias → PDF</title>

<!-- html2canvas + jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --border:   #2a2d3d;
    --accent:   #4f8ef7;
    --accent2:  #7c3aed;
    --success:  #22c55e;
    --warning:  #f59e0b;
    --error:    #ef4444;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --radius:   12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 40px;
  }
  header h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  header p {
    color: var(--muted);
    font-size: 0.95rem;
  }

  /* ── Drop Zone ── */
  #drop-zone {
    width: 100%;
    max-width: 680px;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--surface);
    position: relative;
  }
  #drop-zone:hover,
  #drop-zone.over {
    border-color: var(--accent);
    background: #1e2235;
  }
  #drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  #drop-zone .icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    display: block;
  }
  #drop-zone strong {
    display: block;
    font-size: 1.05rem;
    margin-bottom: 4px;
  }
  #drop-zone span {
    color: var(--muted);
    font-size: 0.85rem;
  }

  /* ── File list ── */
  #file-section {
    width: 100%;
    max-width: 680px;
    margin-top: 28px;
    display: none;
  }
  #file-section h2 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  #file-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 320px;
    overflow-y: auto;
    padding-right: 4px;
  }
  #file-list::-webkit-scrollbar { width: 4px; }
  #file-list::-webkit-scrollbar-track { background: transparent; }
  #file-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .file-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.88rem;
    transition: border-color 0.2s;
  }
  .file-item .name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .file-item .badge {
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .badge-pending  { background: #1e2235; color: var(--muted); border: 1px solid var(--border); }
  .badge-working  { background: #1e3a5f; color: var(--accent); border: 1px solid var(--accent); }
  .badge-done     { background: #14532d; color: var(--success); border: 1px solid var(--success); }
  .badge-error    { background: #450a0a; color: var(--error);   border: 1px solid var(--error);   }

  .file-item .remove-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .file-item .remove-btn:hover { color: var(--error); }

  /* ── Controls ── */
  #controls {
    width: 100%;
    max-width: 680px;
    margin-top: 20px;
    display: none;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  #controls label {
    color: var(--muted);
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #controls select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 0.85rem;
  }

  .btn {
    padding: 11px 24px;
    border-radius: 8px;
    border: none;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-secondary {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }

  /* ── Progress bar ── */
  #progress-wrap {
    width: 100%;
    max-width: 680px;
    margin-top: 16px;
    display: none;
  }
  #progress-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s ease;
    border-radius: 6px;
  }
  #progress-label {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 6px;
    text-align: right;
  }

  /* ── Log ── */
  #log {
    width: 100%;
    max-width: 680px;
    margin-top: 16px;
    background: #0a0c14;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-family: 'Courier New', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    max-height: 160px;
    overflow-y: auto;
    display: none;
    line-height: 1.6;
  }
  #log .ok   { color: var(--success); }
  #log .err  { color: var(--error); }
  #log .info { color: var(--accent); }

  /* ── Hidden iframe used for rendering ── */
  #render-frame {
    position: fixed;
    left: -9999px;
    top: 0;
    width: 1000px;
    height: 1px;
    border: none;
    visibility: hidden;
  }

  @media (max-width: 480px) {
    #controls { flex-direction: column; align-items: stretch; }
    .btn { justify-content: center; }
  }
</style>
</head>
<body>

<header>
  <h1>📄 Constancias → PDF</h1>
  <p>Seleccioná una carpeta con archivos HTML y convertila a PDF sin romper el formato</p>
</header>

<!-- Drop Zone -->
<div id="drop-zone">
  <input type="file" id="file-input" accept=".html,.htm" multiple webkitdirectory>
  <span class="icon">📁</span>
  <strong>Hacé clic o arrastrá la carpeta aquí</strong>
  <span>Acepta archivos .html y .htm · Procesa por lotes</span>
</div>

<!-- File list -->
<div id="file-section">
  <h2 id="file-count-label">0 archivos detectados</h2>
  <div id="file-list"></div>
</div>

<!-- Controls -->
<div id="controls">
  <label>
    Escala:
    <select id="scale-select">
      <option value="1">Normal (1×)</option>
      <option value="1.5">Alta (1.5×)</option>
      <option value="2" selected>Máxima (2×)</option>
    </select>
  </label>
  <label>
    Orientación:
    <select id="orientation-select">
      <option value="p">Vertical</option>
      <option value="l">Horizontal</option>
    </select>
  </label>
  <button class="btn btn-secondary" id="clear-btn">🗑 Limpiar</button>
  <button class="btn btn-primary" id="convert-btn">⚡ Convertir todos a PDF</button>
</div>

<!-- Progress -->
<div id="progress-wrap">
  <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
  <div id="progress-label">0 / 0</div>
</div>

<!-- Log -->
<div id="log"></div>

<!-- Hidden iframe for rendering -->
<iframe id="render-frame"></iframe>

<script>
const { jsPDF } = window.jspdf;

// ── State ──────────────────────────────────────
let files = []; // {file, name, status, id}

// ── DOM refs ──────────────────────────────────
const dropZone       = document.getElementById('drop-zone');
const fileInput      = document.getElementById('file-input');
const fileSection    = document.getElementById('file-section');
const fileCountLabel = document.getElementById('file-count-label');
const fileList       = document.getElementById('file-list');
const controls       = document.getElementById('controls');
const clearBtn       = document.getElementById('clear-btn');
const convertBtn     = document.getElementById('convert-btn');
const progressWrap   = document.getElementById('progress-wrap');
const progressFill   = document.getElementById('progress-bar-fill');
const progressLabel  = document.getElementById('progress-label');
const logDiv         = document.getElementById('log');
const frame          = document.getElementById('render-frame');
const scaleSelect    = document.getElementById('scale-select');
const orientSelect   = document.getElementById('orientation-select');

// ── Drag & drop ───────────────────────────────
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  const items = [...e.dataTransfer.files].filter(f => /\.html?$/i.test(f.name));
  addFiles(items);
});
fileInput.addEventListener('change', () => {
  const items = [...fileInput.files].filter(f => /\.html?$/i.test(f.name));
  addFiles(items);
  fileInput.value = '';
});

function addFiles(newFiles) {
  newFiles.forEach(f => {
    if (!files.find(x => x.name === f.name)) {
      files.push({ file: f, name: f.name, status: 'pending', id: crypto.randomUUID() });
    }
  });
  renderFileList();
}

function renderFileList() {
  fileList.innerHTML = '';
  if (files.length === 0) {
    fileSection.style.display = 'none';
    controls.style.display = 'none';
    return;
  }
  fileSection.style.display = 'block';
  controls.style.display = 'flex';
  fileCountLabel.textContent = `${files.length} archivo${files.length > 1 ? 's' : ''} detectado${files.length > 1 ? 's' : ''}`;

  files.forEach(f => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.id = 'item-' + f.id;

    const badgeMap = { pending: 'Pendiente', working: 'Procesando...', done: 'Listo ✓', error: 'Error' };
    const classMap = { pending: 'badge-pending', working: 'badge-working', done: 'badge-done', error: 'badge-error' };

    item.innerHTML = `
      <span class="name" title="${f.name}">${f.name}</span>
      <span class="badge ${classMap[f.status]}">${badgeMap[f.status]}</span>
      <button class="remove-btn" data-id="${f.id}" title="Quitar">✕</button>
    `;
    fileList.appendChild(item);
  });

  fileList.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      files = files.filter(f => f.id !== id);
      renderFileList();
    });
  });
}

function updateItemStatus(id, status) {
  const f = files.find(x => x.id === id);
  if (f) f.status = status;
  const item = document.getElementById('item-' + id);
  if (!item) return;
  const badgeMap = { pending: 'Pendiente', working: 'Procesando...', done: 'Listo ✓', error: 'Error' };
  const classMap = { pending: 'badge-pending', working: 'badge-working', done: 'badge-done', error: 'badge-error' };
  const badge = item.querySelector('.badge');
  badge.className = 'badge ' + classMap[status];
  badge.textContent = badgeMap[status];
}

// ── Log ───────────────────────────────────────
function log(msg, type = '') {
  logDiv.style.display = 'block';
  const line = document.createElement('div');
  line.className = type;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logDiv.appendChild(line);
  logDiv.scrollTop = logDiv.scrollHeight;
}

// ── Clear ─────────────────────────────────────
clearBtn.addEventListener('click', () => {
  files = [];
  logDiv.innerHTML = '';
  logDiv.style.display = 'none';
  progressWrap.style.display = 'none';
  renderFileList();
});

// ── Convert ───────────────────────────────────
convertBtn.addEventListener('click', convertAll);

async function convertAll() {
  if (!files.length) return;
  const pending = files.filter(f => f.status !== 'done');
  if (!pending.length) { log('Todos los archivos ya fueron convertidos.', 'info'); return; }

  convertBtn.disabled = true;
  clearBtn.disabled   = true;
  progressWrap.style.display = 'block';

  const scale       = parseFloat(scaleSelect.value);
  const orientation = orientSelect.value;

  let done = 0;
  const total = pending.length;

  for (const f of pending) {
    updateItemStatus(f.id, 'working');
    log(`Procesando: ${f.name}`, 'info');

    try {
      const pdfBytes = await htmlFileToPDF(f.file, scale, orientation);
      download(pdfBytes, f.name.replace(/\.html?$/i, '.pdf'));
      updateItemStatus(f.id, 'done');
      log(`OK → ${f.name.replace(/\.html?$/i, '.pdf')}`, 'ok');
    } catch (err) {
      updateItemStatus(f.id, 'error');
      log(`ERROR en ${f.name}: ${err.message}`, 'err');
      console.error(err);
    }

    done++;
    const pct = Math.round((done / total) * 100);
    progressFill.style.width = pct + '%';
    progressLabel.textContent = `${done} / ${total} — ${pct}%`;

    // pequeña pausa para que el browser respire
    await sleep(200);
  }

  convertBtn.disabled = false;
  clearBtn.disabled   = false;
  log(`Proceso finalizado. ${done}/${total} convertidos.`, 'ok');
}

// ── Core: HTML → PDF ─────────────────────────
function htmlFileToPDF(file, scale, orientation) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = async (e) => {
      try {
        let html = e.target.result;

        // Inyectamos un <base> para que assets relativos no fallen
        // y forzamos ancho fijo para que el layout Bootstrap se renderice bien
        const injectStyle = `
          <style>
            body { width: 960px !important; margin: 0 !important; }
            /* Aseguramos que las imágenes base64 carguen */
            img { max-width: 100% !important; }
            /* Evitamos page-break visual en canvas */
            * { print-color-adjust: exact !important; -webkit-print-color-adjust: exact !important; }
          </style>
        `;

        // Insertamos el style antes del </head> o al inicio del <body>
        if (/<\/head>/i.test(html)) {
          html = html.replace(/<\/head>/i, injectStyle + '</head>');
        } else {
          html = injectStyle + html;
        }

        const blob = new Blob([html], { type: 'text/html; charset=utf-8' });
        const url  = URL.createObjectURL(blob);

        frame.style.width  = '1000px';
        frame.style.height = '100px';
        frame.src = url;

        frame.onload = async () => {
          try {
            const doc  = frame.contentDocument || frame.contentWindow.document;
            const body = doc.body;

            // Esperamos a que las imágenes base64 estén listas
            await waitForImages(doc);

            // Altura real del contenido
            const contentH = Math.max(body.scrollHeight, body.offsetHeight, 1200);
            frame.style.height = contentH + 'px';
            // pequeña pausa para re-layout
            await sleep(300);

            const canvas = await html2canvas(body, {
              scale,
              useCORS: true,
              allowTaint: true,
              backgroundColor: '#ffffff',
              width:  960,
              height: contentH,
              windowWidth:  960,
              windowHeight: contentH,
              logging: false,
              imageTimeout: 15000,
              onclone: (clonedDoc) => {
                // Aseguramos visibilidad completa en el clon
                clonedDoc.body.style.overflow = 'visible';
                clonedDoc.documentElement.style.overflow = 'visible';
              }
            });

            URL.revokeObjectURL(url);

            // PDF dimensions: A4 = 210 × 297 mm
            const pageW  = orientation === 'p' ? 210 : 297;
            const pageH  = orientation === 'p' ? 297 : 210;

            const pdf = new jsPDF({ orientation, unit: 'mm', format: 'a4' });

            const imgW   = pageW;
            const imgH   = (canvas.height * imgW) / canvas.width;
            const pageHpx = (canvas.width * pageH) / pageW; // height in px per page

            let yOffset = 0;
            let pageIndex = 0;

            while (yOffset < canvas.height) {
              if (pageIndex > 0) pdf.addPage();

              // Recortamos el segmento de esta página
              const segH    = Math.min(pageHpx, canvas.height - yOffset);
              const segCanvas = document.createElement('canvas');
              segCanvas.width  = canvas.width;
              segCanvas.height = segH;
              const ctx = segCanvas.getContext('2d');
              ctx.drawImage(canvas, 0, yOffset, canvas.width, segH, 0, 0, canvas.width, segH);

              const imgData = segCanvas.toDataURL('image/jpeg', 0.92);
              const segHmm  = (segH * pageW) / canvas.width;

              pdf.addImage(imgData, 'JPEG', 0, 0, pageW, segHmm);

              yOffset += pageHpx;
              pageIndex++;
            }

            resolve(pdf.output('arraybuffer'));
          } catch (err) {
            URL.revokeObjectURL(url);
            reject(err);
          }
        };

        frame.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error('No se pudo cargar el iframe'));
        };

      } catch (err) {
        reject(err);
      }
    };

    reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
    reader.readAsText(file, 'UTF-8');
  });
}

// ── Helpers ───────────────────────────────────
function waitForImages(doc) {
  const imgs = [...doc.images];
  if (!imgs.length) return Promise.resolve();
  return Promise.all(imgs.map(img =>
    img.complete
      ? Promise.resolve()
      : new Promise(res => { img.onload = res; img.onerror = res; })
  ));
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function download(buffer, filename) {
  const blob = new Blob([buffer], { type: 'application/pdf' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 3000);
}
</script>
</body>
</html>
